<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="1.png">
  <title>BE♡</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Birthstone&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(rgba(245, 184, 215, 0.6), rgba(245, 184, 215, 0.6)),
        url("fondo.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;

      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Birthstone", sans-serif;
      color: #5E4343;
      cursor: pointer;
      padding: 20px;
    }

    .container {
      text-align: center;
      width: 100%;
      max-width: 500px;
      padding: 24px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
    }

    img {
  width: 100%;
  height: auto;
  max-width: 100%;
  max-height: 70vh;
  object-fit: contain;
  border-radius: 16px;
  margin-bottom: 18px;
}

   h1 {
  font-size: clamp(2rem, 4vw, 2.5rem);
  line-height: 1.5;
  margin: 0;
}


    p {
      margin-top: 10px;
      opacity: 0.6;
      font-size: 0.8rem;
    }
    
 #hint {
  font-size: clamp(1.2rem, 3vw, 1.7rem);
  opacity: 0.4;
  animation: blink 2.5s ease-in-out infinite;
  pointer-events: none;
}

@keyframes blink {
  0%, 100% {
    opacity: 0.3;
  }
  50% {
    opacity: 0.6;
  }
}

  </style>
</head>

<body onclick="changeVibe()">

  <div class="container">
    <img id="vibeImage" src="1.jpeg" alt="vibe image" />
    <h1 id="phrase">COSAS ♡</h1>
    <p id="hint">❤Haz clic para continuar❤</p>
  </div>

  <!-- 🔊 Sonido de clic -->
  <audio id="clickSound">
    <source src="skipp.mp3" type="audio/mpeg">
  </audio>

  <script>
  const phrases = [
    "AIORA",
    "OFICIALMENTE ESTÁS BANEADA",
    "OMAIGAT"
    
  ];


  const phraseEl = document.getElementById("phrase");
  const imageEl = document.getElementById("vibeImage");
  const clickSound = document.getElementById("clickSound");
  const hintEl = document.getElementById("hint");
  const finalPhrase = "TE AMO, TE AMO, TE AMO, TE AMO, TE AMO, TE AMO, TE AMO, TE AMO, TE AMO, TE AMO, TE AMO, TE AMO, TE AMO, TE AMO, TE AMO, TE AMO, TE AMO, TE AMO, TE AMO, TE AMO, TE AMO, TE AMO, TE AMO, TE AMO, TE AMO, TE AMO, TE AMO, TE AMO, TE AMO, TE AMO, TE AMO, TE AMO, TE AMO";

  let hasClicked = false;
  let phraseIndex = 0;
  let imageIndex = 0;
  let phraseCount = 0;
  let finalShown = false;


  imageEl.style.display = "none";
  clickSound.volume = 0.4;

  function changeVibe() {
  // ocultar el hint solo la primera vez
  if (!hasClicked) {
    hintEl.style.display = "none";
    hasClicked = true;
  }

  // 🔊 sonido
  clickSound.currentTime = 0;
  clickSound.play();

  // 👉 CUANDO YA NO HAY FRASES
  if (phraseIndex >= phrases.length) {

    // 👉 TODAVÍA HAY IMÁGENES
    if (imageIndex < vibes.length) {
      phraseEl.style.display = "none";

      imageEl.src = vibes[imageIndex].img;
      phraseEl.textContent = vibes[imageIndex].text;

      imageEl.style.display = "block";
      phraseEl.style.display = "block";

      imageIndex++;
      return;
    }

    // 👉 FRASE FINAL (SOLO UNA VEZ)
    if (!finalShown) {
      imageEl.style.display = "none";

      phraseEl.textContent = finalPhrase;
      phraseEl.style.fontSize = "clamp(2.6rem, 6vw, 3.2rem)";
      phraseEl.style.opacity = "0.9";

      phraseEl.style.display = "block";
      finalShown = true;
    }

    return;
  }

  // 👉 CADA 4 FRASES → IMAGEN
  if (phraseCount === 4 && imageIndex < vibes.length) {
    phraseEl.style.display = "none";

    imageEl.src = vibes[imageIndex].img;
    phraseEl.textContent = vibes[imageIndex].text;

    imageEl.style.display = "block";
    phraseEl.style.display = "block";

    imageIndex++;
    phraseCount = 0;
    return;
  }

  // 👉 MOSTRAR FRASE NORMAL
  imageEl.style.display = "none";
  phraseEl.textContent = phrases[phraseIndex];
  phraseEl.style.display = "block";

  phraseIndex++;
  phraseCount++;
}


</script>

</body>
</html>
